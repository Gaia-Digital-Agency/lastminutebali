name: Production Deployment Pipeline

on:
    push:
        branches:
            - main

jobs:
    production:
        name: Production Release
        runs-on: ubuntu-latest

        steps:
            # Checkout
            - name: Checkout
              uses: actions/checkout@v4

            # Build
            - name: Build
              run: echo "No build process required. Preparing deployment package."

            # Deploy
            - name: Deploy
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.SFTP_SERVER }}
                  username: ${{ secrets.SFTP_USERNAME }}
                  password: ${{ secrets.SFTP_PASSWORD }}
                  port: ${{ secrets.SFTP_PORT }}
                  protocol: ftp
                  local-dir: ./wp-content/themes/scamcheck/
                  server-dir: /public_html/wp-content/themes/scamcheck/
                  dangerous-clean-slate: false
                  exclude: |
                      **/.git*
                      **/.github*
                      wp-config.php
                      wp-content/uploads/**
